<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- iOS PWA 풀스크린 핵심 설정 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-touch-fullscreen" content="yes">
    
    <title>Andrew Launcher</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden;
            padding: 20px 15px;
            touch-action: manipulation;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 0 10px;
        }
        .title { font-size: 42px; font-weight: 600; }
        .time { font-size: 18px; opacity: 0.8; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px 15px;
            max-width: 380px;
            margin: 0 auto;
        }
        .app {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .icon {
            width: 78px;
            height: 78px;
            background-color: #1c1c1e;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        .app-name { font-size: 13px; font-weight: 500; }
        
        .close-btn {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c2c2e;
            padding: 12px 60px;
            border-radius: 30px;
            font-size: 17px;
            border: none;
            color: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">Daily</div>
        <div class="time" id="time"></div>
    </div>

    <div class="grid">
        <div class="app" onclick="openLink('https://www.google.com')"><div class="icon">🌐</div><div class="app-name">CHROME</div></div>
        <div class="app" onclick="openLink('https://mail.google.com')"><div class="icon">✉️</div><div class="app-name">MAIL</div></div>
        <div class="app" onclick="openLink('https://web.telegram.org')"><div class="icon">✈️</div><div class="app-name">TELEGRAM</div></div>
        
        <div class="app" onclick="openLink('https://messages.google.com')"><div class="icon">💬</div><div class="app-name">MESSAGES</div></div>
        <div class="app" onclick="openLink('tel:')"><div class="icon">📞</div><div class="app-name">PHONE</div></div>
        <div class="app" onclick="openLink('https://x.com')"><div class="icon">❌</div><div class="app-name">X</div></div>
        
        <div class="app" onclick="openLink('#')"><div class="icon">🏠</div><div class="app-name">EVERYDAY</div></div>
        <div class="app" onclick="openLink('https://tesla.com')"><div class="icon">🚗</div><div class="app-name">TESLA</div></div>
        <div class="app"><div class="icon">➕</div><div class="app-name">추가</div></div>
    </div>

    <button class="close-btn" onclick="window.close()">CLOSE</button>

    <script>
        function openLink(url) {
            window.open(url, '_blank');
        }

        // 실시간 시간
        function updateTime() {
            const timeEl = document.getElementById('time');
            setInterval(() => {
                const now = new Date();
                timeEl.textContent = now.getHours().toString().padStart(2, '0') + ':' + 
                                    now.getMinutes().toString().padStart(2, '0');
            }, 1000);
        }
        updateTime();
    </script>
</body>
</html>
