<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- PWA 설정 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-touch-fullscreen" content="yes">
    
    <title>Andrew Launcher</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            margin-bottom: 70px;
        }
        .title { 
            font-size: 48px; 
            font-weight: 600; 
        }
        
        .menu {
            display: flex;
            flex-direction: column;
            gap: 35px;
            width: 100%;
            max-width: 380px;
        }
        .menu-item {
            font-size: 26px;
            font-weight: 500;
            text-align: center;
            padding: 12px 0;
            color: #ffffff;
            transition: all 0.2s;
            cursor: pointer;
        }
        .menu-item:active {
            color: #aaaaaa;
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">😊</div>
    </div>

    <div class="menu">
        <div class="menu-item" onclick="openLink('https://www.google.com')">CHROME</div>
        <div class="menu-item" onclick="openLink('https://mail.google.com')">MAIL</div>
        <div class="menu-item" onclick="openLink('https://web.telegram.org')">TELEGRAM</div>
        <div class="menu-item" onclick="openLink('https://x.com')">X</div>
        <div class="menu-item" onclick="openLink('https://messages.google.com')">MESSAGES</div>
        <div class="menu-item" onclick="openLink('tel:')">PHONE</div>
        <div class="menu-item" onclick="openLink('#')">EVERYDAY</div>
        <div class="menu-item" onclick="openLink('https://tesla.com')">TESLA</div>
    </div>

    <script>
        function openLink(url) {
            if (url === 'tel:') {
                window.location.href = url;
            } else {
                window.open(url, '_blank');
            }
        }
    </script>
</body>
</html>
