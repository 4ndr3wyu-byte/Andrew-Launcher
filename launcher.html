<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Daily</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #000;
    --card: rgba(255,255,255,0.06);
    --card-hover: rgba(255,255,255,0.12);
    --text: rgba(255,255,255,0.9);
    --sub: rgba(255,255,255,0.35);
    --border: rgba(255,255,255,0.08);
  }

  body {
    background: var(--bg);
    font-family: 'DM Sans', -apple-system, sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    color: var(--text);
    overflow: hidden;
  }

  /* ── 잠금 화면 ── */
  #lock {
    position: fixed; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    z-index: 10;
    transition: opacity 0.4s ease;
  }

  #lock .time {
    font-size: 72px;
    font-weight: 200;
    letter-spacing: -2px;
    line-height: 1;
  }

  #lock .date {
    font-size: 14px;
    font-weight: 300;
    color: var(--sub);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  #lock .hint {
    position: absolute;
    bottom: 60px;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--sub);
    text-transform: uppercase;
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.8; }
  }

  /* ── 런처 화면 ── */
  #launcher {
    position: fixed; inset: 0;
    display: flex;
    flex-direction: column;
    padding: 0 24px;
    padding-top: env(safe-area-inset-top, 60px);
    padding-bottom: env(safe-area-inset-bottom, 40px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }

  #launcher.visible {
    opacity: 1;
    pointer-events: all;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 32px;
    padding-top: 20px;
  }

  .header-title {
    font-size: 32px;
    font-weight: 200;
    letter-spacing: -0.5px;
  }

  .header-time {
    font-size: 13px;
    color: var(--sub);
    letter-spacing: 1px;
    font-weight: 300;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    flex: 1;
    align-content: center;
  }

  .app-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px 8px;
    cursor: pointer;
    color: var(--text);
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.5px;
    font-family: inherit;
    transition: background 0.15s, transform 0.15s, border-color 0.15s;
    -webkit-user-select: none;
    aspect-ratio: 1;
  }

  .app-btn:active {
    background: var(--card-hover);
    transform: scale(0.94);
    border-color: rgba(255,255,255,0.18);
  }

  .app-icon {
    font-size: 30px;
    line-height: 1;
  }

  .app-name {
    color: var(--sub);
    font-size: 10px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  /* 닫기 버튼 */
  .close-bar {
    display: flex;
    justify-content: center;
    padding: 16px 0 8px;
  }

  .close-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 10px 40px;
    color: var(--sub);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }

  .close-btn:active {
    background: rgba(255,255,255,0.14);
  }

  /* 앱 열릴 때 플래시 */
  #flash {
    position: fixed; inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    transition: opacity 0.1s;
  }

  /* 진입 애니메이션 */
  .app-btn {
    opacity: 0;
    transform: translateY(10px);
  }

  #launcher.visible .app-btn {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.3s ease, transform 0.3s ease,
                background 0.15s, border-color 0.15s;
  }

  #launcher.visible .app-btn:nth-child(1) { transition-delay: 0.03s; }
  #launcher.visible .app-btn:nth-child(2) { transition-delay: 0.06s; }
  #launcher.visible .app-btn:nth-child(3) { transition-delay: 0.09s; }
  #launcher.visible .app-btn:nth-child(4) { transition-delay: 0.12s; }
  #launcher.visible .app-btn:nth-child(5) { transition-delay: 0.15s; }
  #launcher.visible .app-btn:nth-child(6) { transition-delay: 0.18s; }
  #launcher.visible .app-btn:nth-child(7) { transition-delay: 0.21s; }
  #launcher.visible .app-btn:nth-child(8) { transition-delay: 0.24s; }
</style>
</head>
<body>

<!-- 잠금 화면 -->
<div id="lock" onclick="openLauncher()">
  <div class="time" id="clock">--:--</div>
  <div class="date" id="dateStr">---</div>
  <div class="hint">tap to open</div>
</div>

<!-- 런처 -->
<div id="launcher">
  <div class="header">
    <div class="header-title">Daily</div>
    <div class="header-time" id="launcherClock">--:--</div>
  </div>

  <div class="grid">
    <button class="app-btn" onclick="openApp('googlechrome://')">
      <span class="app-icon">🌐</span>
      <span class="app-name">Chrome</span>
    </button>
    <button class="app-btn" onclick="openApp('message://')">
      <span class="app-icon">✉️</span>
      <span class="app-name">Mail</span>
    </button>
    <button class="app-btn" onclick="openApp('tg://')">
      <span class="app-icon">✈️</span>
      <span class="app-name">Telegram</span>
    </button>
    <button class="app-btn" onclick="openApp('sms://')">
      <span class="app-icon">💬</span>
      <span class="app-name">Messages</span>
    </button>
    <button class="app-btn" onclick="openApp('tel://')">
      <span class="app-icon">📞</span>
      <span class="app-name">Phone</span>
    </button>
    <button class="app-btn" onclick="openApp('twitter://')">
      <span class="app-icon">✖️</span>
      <span class="app-name">X</span>
    </button>
    <button class="app-btn" onclick="openApp('everyday://')">
      <span class="app-icon">🏠</span>
      <span class="app-name">Everyday</span>
    </button>
    <button class="app-btn" onclick="openApp('openteslabonnet://')">
      <span class="app-icon">🚗</span>
      <span class="app-name">Tesla</span>
    </button>
  </div>

  <div class="close-bar">
    <button class="close-btn" onclick="closeLauncher()">close</button>
  </div>
</div>

<div id="flash"></div>

<script>
  // 시계
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const timeStr = h + ':' + m;

    document.getElementById('clock').textContent = timeStr;
    document.getElementById('launcherClock').textContent = timeStr;

    const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    document.getElementById('dateStr').textContent =
      days[now.getDay()] + '  ' + now.getDate() + ' ' + months[now.getMonth()];
  }
  updateClock();
  setInterval(updateClock, 10000);

  // 열기/닫기
  function openLauncher() {
    document.getElementById('lock').style.opacity = '0';
    document.getElementById('lock').style.pointerEvents = 'none';
    document.getElementById('launcher').classList.add('visible');
  }

  function closeLauncher() {
    document.getElementById('launcher').classList.remove('visible');
    setTimeout(() => {
      document.getElementById('lock').style.opacity = '1';
      document.getElementById('lock').style.pointerEvents = 'all';
    }, 300);
  }

  // 앱 실행 (데모에서는 알림만)
  function openApp(url) {
    const flash = document.getElementById('flash');
    flash.style.opacity = '0.15';
    setTimeout(() => { flash.style.opacity = '0'; }, 150);

    // 실제 기기에서는 아래 줄이 앱을 열어줌
    // window.location.href = url;

    // 데모용 표시
    const name = event.currentTarget.querySelector('.app-name').textContent;
    setTimeout(() => {
      alert('→ ' + name + ' 앱 실행\n\n실제 기기에서는 바로 해당 앱으로 이동합니다');
    }, 160);
  }
</script>
</body>
</html>
